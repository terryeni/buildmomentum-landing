<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D7FF3E"/>
      <stop offset="1" stop-color="#acd028"/>
    </linearGradient>
    <radialGradient id="glow1" cx="82%" cy="-6%" r="55%">
      <stop offset="0" stop-color="#D7FF3E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D7FF3E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="6%" cy="10%" r="55%">
      <stop offset="0" stop-color="#2E86AB" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2E86AB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0B0B0F"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- brand row -->
  <g transform="translate(80,76)">
    <rect width="56" height="56" rx="16" fill="url(#mark)"/>
    <text x="28" y="40" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="900" font-size="34" fill="#0B0B0F">B</text>
    <text x="76" y="38" font-family="Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="30" letter-spacing="-0.5" fill="#F4F5F7">Build Momentum</text>
  </g>

  <!-- headline -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#F4F5F7">
    <text x="80" y="300" font-weight="800" font-size="86" letter-spacing="-2">The gym streak</text>
    <text x="80" y="396" font-weight="800" font-size="86" letter-spacing="-2">you can&#8217;t <tspan fill="#D7FF3E">break</tspan></text>
  </g>

  <!-- subline -->
  <text x="82" y="470" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="32" fill="#9A9CA8">A forgiving weekly streak that survives rest days and bad weeks.</text>

  <!-- footer chips -->
  <g font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="26" fill="#D7FF3E">
    <text x="80" y="556">Free</text>
    <text x="200" y="556" fill="#9A9CA8">&#183;</text>
    <text x="230" y="556">No account</text>
    <text x="430" y="556" fill="#9A9CA8">&#183;</text>
    <text x="460" y="556">Fully private</text>
    <text x="660" y="556" fill="#9A9CA8">&#183;</text>
    <text x="690" y="556">On iPhone</text>
  </g>
</svg>
